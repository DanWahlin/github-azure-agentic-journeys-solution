server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any unmatched path so client-side
    # routes (e.g. /products/:id, /cart) resolve. No /api/ proxy block — the
    # frontend calls the API directly via the VITE_API_URL baked in at build.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
