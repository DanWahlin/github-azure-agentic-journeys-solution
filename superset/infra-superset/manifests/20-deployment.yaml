apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: superset
  labels:
    app: superset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      volumes:
        - name: psycopg2-install
          emptyDir: {}
        - name: superset-config
          configMap:
            name: superset-config
      initContainers:
        - name: superset-init
          image: apache/superset:4.1.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              pip install psycopg2-binary --target=/psycopg2-lib
              export PYTHONPATH=/psycopg2-lib:$PYTHONPATH
              superset db upgrade
              superset fab create-admin \
                --username admin \
                --firstname Admin \
                --lastname User \
                --email admin@example.com \
                --password "$ADMIN_PASSWORD" || true
              superset init
          env:
            - name: SUPERSET_CONFIG_PATH
              value: /app/pythonpath/superset_config.py
            - name: PYTHONPATH
              value: /psycopg2-lib
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: database-uri
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: secret-key
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: admin-password
          volumeMounts:
            - name: psycopg2-install
              mountPath: /psycopg2-lib
            - name: superset-config
              mountPath: /app/pythonpath
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      containers:
        - name: superset
          image: apache/superset:4.1.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              export PYTHONPATH=/psycopg2-lib:$PYTHONPATH
              exec gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 "superset.app:create_app()"
          ports:
            - containerPort: 8088
          env:
            - name: SUPERSET_CONFIG_PATH
              value: /app/pythonpath/superset_config.py
            - name: PYTHONPATH
              value: /psycopg2-lib
            - name: SUPERSET_LOAD_EXAMPLES
              value: "false"
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: database-uri
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: secret-key
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: admin-password
          volumeMounts:
            - name: psycopg2-install
              mountPath: /psycopg2-lib
            - name: superset-config
              mountPath: /app/pythonpath
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          startupProbe:
            httpGet:
              path: /health
              port: 8088
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
