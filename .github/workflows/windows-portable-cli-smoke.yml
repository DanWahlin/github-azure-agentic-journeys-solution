name: Windows portable CLI smoke test

on:
  pull_request:
    paths:
      - ".github/scripts/_utils.mjs"
      - ".github/scripts/run-aks-command.mjs"
      - ".github/skills/journey-runner/scripts/check-prerequisites.mjs"
      - ".github/workflows/windows-portable-cli-smoke.yml"
      - "n8n/infra-n8n/hooks/postprovision.js"
      - "n8n/scripts/verify-n8n.mjs"
      - "smart-todo/infra/hooks/postprovision.js"
      - "superset/azure.yaml"
      - "superset/infra-superset/hooks/postprovision.js"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-portable-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Create Azure CLI shims
        shell: pwsh
        run: |
          $fake = Join-Path $env:RUNNER_TEMP "fake-azure-cli"
          New-Item -ItemType Directory -Force -Path $fake | Out-Null

          @'
          @echo off
          node "%~dp0fake-azd.mjs" %*
          '@ | Set-Content -Encoding ascii (Join-Path $fake "azd.cmd")

          @'
          @echo off
          node "%~dp0fake-az.mjs" %*
          '@ | Set-Content -Encoding ascii (Join-Path $fake "az.cmd")

          @'
          const args = process.argv.slice(2);
          if (args[0] === 'version') {
            console.log('azd version 1.28.0');
          } else if (args[0] === 'env' && args[1] === 'get-value') {
            console.log('value with spaces;quotes"()');
          } else if (args[0] === 'env' && args[1] === 'get-values') {
            console.log(JSON.stringify({
              AZURE_RESOURCE_GROUP: 'rg-test',
              AZURE_AKS_CLUSTER_NAME: 'aks-test'
            }));
          } else if (args[0] === 'stdin') {
            let input = '';
            for await (const chunk of process.stdin) input += chunk;
            console.log(input.trim());
          } else if (args[0] === 'echo-args') {
            console.log(JSON.stringify(args.slice(1)));
          } else if (args[0] === 'cwd') {
            console.log(process.cwd());
          } else {
            console.error(`unexpected azd args: ${JSON.stringify(args)}`);
            process.exit(2);
          }
          '@ | Set-Content -Encoding utf8 (Join-Path $fake "fake-azd.mjs")

          @'
          const args = process.argv.slice(2);
          if (args[0] === 'version') {
            console.log('{}');
          } else if (args.slice(0, 3).join(' ') === 'aks command invoke') {
            console.log(JSON.stringify({
              provisioningState: 'Succeeded',
              exitCode: 0,
              logs: 'remote diagnostic passed\n'
            }));
          } else {
            console.error(`unexpected az args: ${JSON.stringify(args)}`);
            process.exit(2);
          }
          '@ | Set-Content -Encoding utf8 (Join-Path $fake "fake-az.mjs")

          $fake | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Exercise shared launcher and prerequisite checker
        shell: pwsh
        run: |
          @'
          import { join } from 'node:path';
          import { run } from './.github/scripts/_utils.mjs';
          const value = run('azd', ['env', 'get-value', 'TEST']).stdout.trim();
          if (value !== 'value with spaces;quotes"()') throw new Error(value);
          const cmdSpecial = ['space value', 'semi;colon', 'amp&pipe|percent%bang!', 'paren()'];
          const echoed = JSON.parse(run('azd', ['echo-args', ...cmdSpecial]).stdout);
          if (JSON.stringify(echoed) !== JSON.stringify(cmdSpecial)) throw new Error(JSON.stringify(echoed));
          const exeSpecial = [...cmdSpecial, 'quote"value'];
          const echoScript = join(process.env.RUNNER_TEMP, 'fake-azure-cli', 'fake-azd.mjs');
          const exeEchoed = JSON.parse(run(process.execPath, [echoScript, 'echo-args', ...exeSpecial]).stdout);
          if (JSON.stringify(exeEchoed) !== JSON.stringify(exeSpecial)) throw new Error(JSON.stringify(exeEchoed));
          let quoteRejected = false;
          try { run('azd', ['echo-args', 'quote"value']); }
          catch (error) { quoteRejected = /cannot be passed safely/.test(String(error)); }
          if (!quoteRejected) throw new Error('Quoted .cmd argument was not rejected');
          const stdin = run('azd', ['stdin'], { input: 'stdin value\n' }).stdout.trim();
          if (stdin !== 'stdin value') throw new Error(stdin);
          const expectedCwd = new URL('./.github/', import.meta.url);
          const actualCwd = run('azd', ['cwd'], { cwd: expectedCwd }).stdout.trim();
          if (!actualCwd.replace(/\\/g, '/').toLowerCase().endsWith('/.github')) throw new Error(actualCwd);
          '@ | node --input-type=module
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node .github/skills/journey-runner/scripts/check-prerequisites.mjs --required node,az,azd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Exercise production CommonJS hook launchers
        shell: pwsh
        run: |
          @'
          const n8n = require('./n8n/infra-n8n/hooks/postprovision.js');
          const smartTodo = require('./smart-todo/infra/hooks/postprovision.js');
          const special = ['space value', 'semi;colon', 'amp&pipe|percent%bang!', 'paren()'];
          for (const [name, run] of [['n8n', n8n.runCli], ['smart-todo', smartTodo.run]]) {
            const echoed = JSON.parse(run('azd', ['echo-args', ...special]));
            if (JSON.stringify(echoed) !== JSON.stringify(special)) throw new Error(`${name}: ${JSON.stringify(echoed)}`);
            let quoteRejected = false;
            try { run('azd', ['echo-args', 'quote"value']); }
            catch (error) { quoteRejected = /cannot be passed safely/.test(String(error)); }
            if (!quoteRejected) throw new Error(`${name}: quoted .cmd argument was not rejected`);
          }
          '@ | node
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node --check n8n/scripts/verify-n8n.mjs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node --check superset/infra-superset/hooks/postprovision.js
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Select-String -Quiet -Path superset/azure.yaml -Pattern 'run: ./infra-superset/hooks/postprovision.js')) {
            throw "Superset azure.yaml does not reference the CommonJS hook"
          }

      - name: Exercise fail-closed AKS diagnostic runner
        shell: pwsh
        run: |
          $output = node .github/scripts/run-aks-command.mjs "kubectl get pods -n superset"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($output -notmatch "remote diagnostic passed") { throw "Unexpected output: $output" }

          node .github/scripts/run-aks-command.mjs 'kubectl get pods; echo INJECTED'
          if ($LASTEXITCODE -eq 0) { throw "Shell chaining was accepted" }

          $quoted = @'
          kubectl exec -n superset pod -c superset -- python -c "import psycopg2; print('OK')"
          '@.Trim()
          node .github/scripts/run-aks-command.mjs $quoted
          if ($LASTEXITCODE -ne 0) { throw "A semicolon inside a quoted argument was rejected" }
